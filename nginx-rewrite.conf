# ============================================================
# 美女导航 - Nginx/OpenResty 伪静态规则
# 使用方式：1Panel 面板 → 网站 → 伪静态 → 粘贴以下内容
# ============================================================

# ---------- URL 伪静态 ----------
rewrite ^/detail/([0-9]+)\.html$ /detail.php?id=$1 last;
rewrite ^/showcase/([0-9]+)\.html$ /showcase.php?gallery=$1 last;
rewrite ^/showcase\.html$ /showcase.php last;
rewrite ^/guestbook\.html$ /guestbook.php last;
rewrite ^/sitemap\.xml$ /sitemap.php last;

# ---------- 404 自定义页面 ----------
error_page 404 /404.php;

# ============================================================
# 注意事项：
#
# 1. 301 重定向规则（旧URL跳转新URL）如果需要，请在 Nginx
#    主配置的 server 块中添加，不要放在伪静态配置中，
#    因为 1Panel 伪静态框的内容会嵌套在 location / 内，
#    而 if + rewrite 在 location 内容易产生循环。
#
# 2. 如果伪静态不生效，请检查 Nginx 配置中是否有：
#    location / {
#        try_files $uri $uri/ /index.php?$query_string;
#    }
#    这条 try_files 会拦截 rewrite，需要删除或改为：
#    try_files $uri $uri/ =404;
#
# 3. 确认 OpenResty 已加载 ngx_http_rewrite_module（默认包含）
# ============================================================
