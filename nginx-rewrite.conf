# ============================================================
# 美女导航 - Nginx/OpenResty 伪静态规则
# 使用方式：1Panel 面板 → 网站 → 伪静态 → 粘贴以下内容
# ============================================================

# ---------- URL 伪静态 ----------
rewrite ^/detail/([0-9]+)\.html$ /detail.php?id=$1 last;
rewrite ^/showcase/([0-9]+)\.html$ /showcase.php?gallery=$1 last;
rewrite ^/showcase\.html$ /showcase.php last;
rewrite ^/guestbook\.html$ /guestbook.php last;
rewrite ^/sitemap\.xml$ /sitemap.php last;

# ---------- 旧 URL 301 重定向到新 URL ----------
# detail.php?id=123 → /detail/123.html
if ($args ~* "^id=(\d+)$") {
    rewrite ^/detail\.php$ /detail/$1.html? permanent;
}
# showcase.php?gallery=1 → /showcase/1.html
if ($args ~* "^gallery=(\d+)$") {
    rewrite ^/showcase\.php$ /showcase/$1.html? permanent;
}
# showcase.php → /showcase.html
rewrite ^/showcase\.php$ /showcase.html? permanent;
# guestbook.php → /guestbook.html
rewrite ^/guestbook\.php$ /guestbook.html? permanent;

# ---------- 404 自定义页面 ----------
error_page 404 /404.php;
