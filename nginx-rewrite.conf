# ============================================================
# 美女导航 - Nginx/OpenResty 伪静态规则
# 使用方式：1Panel 面板 → 网站 → 伪静态 → 粘贴以下内容
# ============================================================

# ---------- URL 伪静态 ----------
rewrite ^/detail/([0-9]+)\.html$ /detail.php?id=$1 last;
rewrite ^/showcase/([0-9]+)\.html$ /showcase.php?gallery=$1 last;
rewrite ^/showcase\.html$ /showcase.php last;
rewrite ^/guestbook\.html$ /guestbook.php last;
rewrite ^/sitemap\.xml$ /sitemap.php last;

# ---------- 404 自定义页面 ----------
# 注意：Nginx 主配置中的 error_page 404 /404.html; 需要手动改为：
# error_page 404 /404.php;
# 否则会优先使用默认的 404.html
