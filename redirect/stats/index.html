<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问统计面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            color: #333;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #667eea;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .stat-card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }
        .section {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .section h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9ff;
            font-weight: 600;
            color: #667eea;
        }
        tr:hover {
            background: #f8f9ff;
        }
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            background: #e3e8ff;
            color: #667eea;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .error {
            text-align: center;
            padding: 40px;
            color: #e74c3c;
        }
        .refresh-btn {
            display: block;
            margin: 0 auto 20px;
            padding: 10px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
        }
        .refresh-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>访问统计面板</h1>
        <button class="refresh-btn" onclick="loadStats()">刷新数据</button>

        <div class="stats-grid" id="overview">
            <div class="loading">加载中...</div>
        </div>

        <div class="section">
            <h2>国家/地区分布 TOP10</h2>
            <table id="countries">
                <tr><th>国家/地区</th><th>访问量</th></tr>
                <tr><td colspan="2" class="loading">加载中...</td></tr>
            </table>
        </div>

        <div class="section">
            <h2>设备分布</h2>
            <table id="devices">
                <tr><th>设备类型</th><th>访问量</th></tr>
                <tr><td colspan="2" class="loading">加载中...</td></tr>
            </table>
        </div>

        <div class="section">
            <h2>浏览器分布 TOP10</h2>
            <table id="browsers">
                <tr><th>浏览器</th><th>访问量</th></tr>
                <tr><td colspan="2" class="loading">加载中...</td></tr>
            </table>
        </div>

        <div class="section">
            <h2>最近访问记录</h2>
            <table id="recent">
                <tr>
                    <th>时间</th>
                    <th>IP</th>
                    <th>国家</th>
                    <th>设备</th>
                    <th>浏览器</th>
                    <th>操作系统</th>
                </tr>
                <tr><td colspan="6" class="loading">加载中...</td></tr>
            </table>
        </div>
    </div>

    <script>
        var API_BASE = '../api/stats.php';

        function loadStats() {
            loadOverview();
            loadCountries();
            loadDevices();
            loadBrowsers();
            loadRecent();
        }

        function loadOverview() {
            fetch(API_BASE + '?action=overview')
                .then(r => r.json())
                .then(data => {
                    var today = data.today || {};
                    var total = data.total || {};
                    document.getElementById('overview').innerHTML = `
                        <div class="stat-card">
                            <h3>今日访问</h3>
                            <div class="number">${today.total || 0}</div>
                        </div>
                        <div class="stat-card">
                            <h3>今日独立IP</h3>
                            <div class="number">${today.unique_ips || 0}</div>
                        </div>
                        <div class="stat-card">
                            <h3>移动端</h3>
                            <div class="number">${today.mobile || 0}</div>
                        </div>
                        <div class="stat-card">
                            <h3>桌面端</h3>
                            <div class="number">${today.desktop || 0}</div>
                        </div>
                        <div class="stat-card">
                            <h3>总访问</h3>
                            <div class="number">${total.total || 0}</div>
                        </div>
                        <div class="stat-card">
                            <h3>总独立IP</h3>
                            <div class="number">${total.unique_ips || 0}</div>
                        </div>
                    `;
                })
                .catch(e => {
                    document.getElementById('overview').innerHTML = '<div class="error">加载失败</div>';
                });
        }

        function loadCountries() {
            fetch(API_BASE + '?action=countries&limit=10')
                .then(r => r.json())
                .then(data => {
                    var html = '<tr><th>国家/地区</th><th>访问量</th></tr>';
                    data.forEach(function(item) {
                        html += `<tr><td>${item.country_name}</td><td>${item.count}</td></tr>`;
                    });
                    document.getElementById('countries').innerHTML = html;
                })
                .catch(e => {
                    document.getElementById('countries').innerHTML = '<tr><td colspan="2" class="error">加载失败</td></tr>';
                });
        }

        function loadDevices() {
            fetch(API_BASE + '?action=devices')
                .then(r => r.json())
                .then(data => {
                    var html = '<tr><th>设备类型</th><th>访问量</th></tr>';
                    data.forEach(function(item) {
                        html += `<tr><td>${item.device_type}</td><td>${item.count}</td></tr>`;
                    });
                    document.getElementById('devices').innerHTML = html;
                })
                .catch(e => {
                    document.getElementById('devices').innerHTML = '<tr><td colspan="2" class="error">加载失败</td></tr>';
                });
        }

        function loadBrowsers() {
            fetch(API_BASE + '?action=browsers')
                .then(r => r.json())
                .then(data => {
                    var html = '<tr><th>浏览器</th><th>访问量</th></tr>';
                    data.forEach(function(item) {
                        html += `<tr><td>${item.browser}</td><td>${item.count}</td></tr>`;
                    });
                    document.getElementById('browsers').innerHTML = html;
                })
                .catch(e => {
                    document.getElementById('browsers').innerHTML = '<tr><td colspan="2" class="error">加载失败</td></tr>';
                });
        }

        function loadRecent() {
            fetch(API_BASE + '?action=recent&limit=50')
                .then(r => r.json())
                .then(data => {
                    var html = '<tr><th>时间</th><th>IP</th><th>国家</th><th>设备</th><th>浏览器</th><th>操作系统</th></tr>';
                    data.forEach(function(item) {
                        html += `<tr>
                            <td>${item.created_at}</td>
                            <td>${item.ip}</td>
                            <td><span class="tag">${item.country_name}</span></td>
                            <td>${item.device_type}</td>
                            <td>${item.browser}</td>
                            <td>${item.os}</td>
                        </tr>`;
                    });
                    document.getElementById('recent').innerHTML = html;
                })
                .catch(e => {
                    document.getElementById('recent').innerHTML = '<tr><td colspan="6" class="error">加载失败</td></tr>';
                });
        }

        // 页面加载时自动获取数据
        loadStats();

        // 每30秒自动刷新
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
