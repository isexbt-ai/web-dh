# Nginx 跳转页配置（简化版）
# 核心功能：QQ/微信拦截 + 静态文件服务

server {
    listen 80;
    server_name _;

    root /var/www/跳转页;
    index index.html;

    # ========== QQ/微信拦截页面（内联HTML）==========
    set $anti_html '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>请在浏览器中打开</title><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black"><meta name="format-detection" content="telephone=no"><meta name="theme-color" content="#667eea"><style>';
    set $anti_html '${anti_html}*{margin:0;padding:0;box-sizing:border-box}body,html{width:100%;height:100%;margin:0;padding:0}body{background:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif}';
    set $anti_html '${anti_html}.container{max-width:480px;margin:0 auto;min-height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}.top-bar{text-align:center;padding:60px 20px 40px;color:#fff}';
    set $anti_html '${anti_html}.top-bar .icon-arrow{display:inline-block;animation:bounce 1.5s infinite}.top-bar .icon-arrow svg{width:40px;height:40px;fill:#fff}';
    set $anti_html '${anti_html}@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}.top-bar h2{font-size:22px;margin:15px 0;font-weight:700}';
    set $anti_html '${anti_html}.top-bar p{font-size:14px;opacity:.9;line-height:2}.content-wrapper{background:#fff;border-radius:20px 20px 0 0;padding:30px 20px;margin-top:-20px;min-height:60vh}';
    set $anti_html '${anti_html}.tips{text-align:center;color:#333}.tips h3{font-size:20px;color:#2466f4;margin-bottom:20px}.tips p{font-size:15px;line-height:2;color:#666;margin:10px 0}';
    set $anti_html '${anti_html}.divider{width:80%;height:1px;background:linear-gradient(to right,transparent,#2466f4,transparent);margin:20px auto}';
    set $anti_html '${anti_html}.browser-icons{display:flex;justify-content:center;gap:30px;margin:20px 0}.browser-icon{text-align:center}.browser-icon svg{width:50px;height:50px}';
    set $anti_html '${anti_html}.browser-icon span{display:block;font-size:12px;color:#999;margin-top:5px}.hint-box{background:#f8f9ff;border-radius:12px;padding:15px;margin:20px 0;border-left:4px solid #2466f4}';
    set $anti_html '${anti_html}.hint-box p{font-size:14px;color:#555;line-height:1.8}.url-box{background:#f5f5f5;border-radius:8px;padding:12px;margin:15px 0;word-break:break-all;font-size:13px;color:#2466f4;text-align:center}';
    set $anti_html '${anti_html}.copy-btn{display:block;width:100%;height:46px;line-height:46px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;text-align:center;border-radius:23px;font-size:16px;text-decoration:none;cursor:pointer;border:none;letter-spacing:1px;-webkit-tap-highlight-color:transparent}';
    set $anti_html '${anti_html}</style></head><body><div class="container"><div class="top-bar"><div class="icon-arrow"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg></div>';
    set $anti_html '${anti_html}<h2>请在浏览器中打开</h2><p>点击右上角 ··· 选择<span style="font-weight:700">在浏览器中打开</span></p></div><div class="content-wrapper"><div class="tips">';
    set $anti_html '${anti_html}<h3>访问提示</h3><p>1. 本站部分功能不支持微信或QQ</p><p>2. 请按提示在手机浏览器打开</p></div><div class="divider"></div>';
    set $anti_html '${anti_html}<div class="browser-icons"><div class="browser-icon"><svg viewBox="0 0 24 24" fill="#147EFB"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg><span>Safari</span></div>';
    set $anti_html '${anti_html}<div class="browser-icon"><svg viewBox="0 0 24 24" fill="#4285F4"><circle cx="12" cy="12" r="10" fill="none" stroke="#4285F4" stroke-width="2"/><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 18a8 8 0 110-16 8 8 0 010 16z"/><circle cx="12" cy="12" r="4" fill="#4285F4"/></svg><span>Chrome</span></div></div>';
    set $anti_html '${anti_html}<div class="hint-box"><p><strong>温馨提示</strong><br>点击右上角菜单，选择<strong>在浏览器中打开</strong>，或复制下方网址自行打开</p></div><div class="url-box" id="url"></div>';
    set $anti_html '${anti_html}<button class="copy-btn" id="copyBtn">点此复制本站网址</button></div></div><script>document.addEventListener("DOMContentLoaded",function(){var e=window.location.href;document.getElementById("url").textContent=e;';
    set $anti_html '${anti_html}var n=document.getElementById("copyBtn");n.addEventListener("click",function(){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(e).then(function(){alert("复制成功！请粘贴到浏览器中打开")})';
    set $anti_html '${anti_html}.catch(function(){t(e)})}else{t(e)}});function t(e){var n=document.createElement("textarea");n.value=e,n.style.position="fixed",n.style.top="0",n.style.left="0",n.style.opacity="0",document.body.appendChild(n),';
    set $anti_html '${anti_html}n.focus(),n.select();try{var t=document.execCommand("copy");t?alert("复制成功！请粘贴到浏览器中打开"):alert("复制失败，请手动复制上方网址")}catch(e){alert("复制失败，请手动复制上方网址")}document.body.removeChild(n)}});</script></body></html>';

    # 拦截QQ/微信UA，返回提示页面
    if ($http_user_agent ~* "QQ/|MicroMessenger") {
        add_header Content-Type "text/html; charset=utf-8";
        return 200 $anti_html;
    }

    # ========== Gzip压缩 ==========
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # ========== 静态文件缓存 ==========
    location ~* \.(ico|svg|png|jpg|jpeg|gif|css|js)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ========== 安全：禁止访问敏感文件 ==========
    location ~ /\. {
        deny all;
        return 403;
    }

    # 允许 stats/api.php 访问（统计功能需要）
    location = /stats/api.php {
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
    }

    location ~* \.php$ {
        deny all;
        return 403;
    }

    # ========== 默认静态文件服务 ==========
    location / {
        try_files $uri $uri/ =404;
    }
}
